// ─── Shared UI primitives ─────────────────────────────────────────────────────
function Card({ children, style, onClick }) {
  return (
    <div onClick={onClick} style={{
      background: T.card, border: `1px solid ${T.border}`,
      borderRadius: 12, overflow: 'hidden',
      cursor: onClick ? 'pointer' : undefined,
      transition: 'background 0.15s',
      ...style,
    }}>
      {children}
    </div>
  );
}

function Badge({ label, color, bg, border }) {

    <span style={{
      display: 'inline-block', fontSize: 11, fontWeight: 700,
      padding: '2px 8px', borderRadius: 999,
      color: color ?? T.accent, background: bg ?? `${T.accent}18`,
      border: `1px solid ${border ?? T.accent + '40'}`,

  );
}

function SectionHead({ icon, title, sub, action }) {
  return (

        </div>
      </div>
      {action}
    </div>
  );
}

function Divider() {
  return <div style={{ height: 1, background: T.border2, margin: '20px 0' }} />;
}

function timeAgo(iso) {
  if (!iso) return null;
  const mins = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
  if (mins < 1)  return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)  return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function fmtUSD(v) {
  if (v == null) return '—';
  return v >= 1000 ? `$${(v/1000).toFixed(1)}k` : `$${v}`;
}

const CAT_COLOR = { Bourbon:'#e8943a', Rye:'#f87171', Scotch:'#60a5fa', Japanese:'#c084fc', American:'#fbbf24', Irish:'#34d399' };
function catCol(c) { return CAT_COLOR[c] ?? '#9a7c55'; }

function discLabel(pct) {
  if (pct >= 40) return { color:'#22c55e', glow:true };
  if (pct >= 30) return { color:'#4ade80', glow:false };
  if (pct >= 20) return { color:'#a3e635', glow:false };
  return { color:'#facc15', glow:false };
}

      <div style={{ padding:'10px 14px 8px', display:'flex', alignItems:'center', justifyContent:'space-between', gap:6 }}>

          {isBargain && <span style={{ fontSize:10, fontWeight:700, background:'rgba(58,175,169,0.15)', color:'#3aafa9', border:'1px solid rgba(58,175,169,0.3)', borderRadius:999, padding:'1px 7px' }}>💰 Bargain</span>}
          <span style={{ fontSize:10, fontWeight:700, background:`${catCol(deal.category)}18`, color:catCol(deal.category), border:`1px solid ${catCol(deal.category)}40`, borderRadius:999, padding:'1px 7px' }}>{deal.category}</span>

            <div style={{ fontSize:13, color:T.t3, marginTop:2 }}>Bids below UA estimated value — updated every few hours</div>
          </div>
          <a href="https://www.unicornauctions.com/auctions" target="_blank" style={{ fontSize:12, color:T.t3, border:`1px solid ${T.border}`, borderRadius:8, padding:'7px 14px', textDecoration:'none' }}>
            View All Auctions ↗
          </a>
        </div>
      </div>

      {/* Stats */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:10, marginBottom:16 }}>
        {stats.map(s => (
          <Card key={s.label} style={{ padding:'10px 14px' }}>
            <div style={{ fontSize:10, color:T.t4, textTransform:'uppercase', letterSpacing:'0.06em' }}>{s.label}</div>
            <div style={{ fontSize:15, fontWeight:700, color:s.color, marginTop:3 }}>{s.value}</div>
          </Card>
        ))}
      </div>

      {/* Weekend banner */}
      <div style={{ background:'rgba(232,148,58,0.08)', border:`1px solid rgba(232,148,58,0.25)`, borderRadius:12, padding:'12px 16px', display:'flex', alignItems:'center', gap:10, marginBottom:16 }}>
        <span style={{ fontSize:20 }}>🟡</span>
        <div>
          <span style={{ color:T.accent, fontWeight:700, fontSize:14 }}>Auctions close this Sunday</span>
          <span style={{ color:T.t3, fontSize:13, marginLeft:8 }}>Plenty of time to plan your bids before Sunday close</span>
        </div>
      </div>

      {/* Filters */}
      <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:12 }}>
        <span style={{ fontSize:11, color:T.t4, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.05em', alignSelf:'center' }}>Category</span>
        {['','Bourbon','Rye','Japanese','Scotch'].map(c => (
          <FChip key={c} label={c || 'All'} active={category===c} onClick={()=>setCategory(c)} color={catCol(c)||undefined} />
        ))}
        <span style={{ fontSize:11, color:T.t4, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.05em', alignSelf:'center', marginLeft:8 }}>Min Bid</span>
        {[0,50,100,250,500].map(v => (
          <FChip key={v} label={v===0?'Any':`$${v}+`} active={minBid===v} onClick={()=>setMinBid(v)} />
        ))}
      </div>

      {/* Grid */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:12 }}>
        {filtered.map((d,i) => <DealCard key={d.id} deal={d} rank={i+1} />)}
      </div>
    </div>
  );
}

// ─── FINDS SCREEN ─────────────────────────────────────────────────────────────
function FindCard({ find, isAdmin }) {
  const ago = timeAgo(find.timestamp);
  const hoursOld = (Date.now() - find.timestamp) / 3600000;
  const isFresh = hoursOld < 6;
  const isStale = hoursOld > 20;

  return (
    <Card style={{ padding:0 }}>
      <div style={{ padding:'12px 14px', borderBottom:`1px solid ${T.border2}` }}>
        <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:8, marginBottom:6 }}>
          <div style={{ fontWeight:700, fontSize:15, color:T.t1, lineHeight:1.3 }}>🥃 {find.bottleName}</div>
          <div style={{ display:'flex', gap:6, flexShrink:0 }}>
            {isFresh && <Badge label="🔥 Fresh" color="#4ade80" bg="rgba(74,222,128,0.1)" border="rgba(74,222,128,0.3)" />}
            {isStale && <Badge label="⏰ Aging" color={T.t4} bg="transparent" border={T.border} />}
          </div>
        </div>
        <div style={{ fontSize:12, color:T.t3, marginBottom:2 }}>📍 {find.store.name}</div>
        <div style={{ fontSize:11, color:T.t4 }}>{find.store.address}</div>
      </div>
      {find.hasPhoto && (
        <div style={{ height:120, background:'#1a1208', display:'flex', alignItems:'center', justifyContent:'center', borderBottom:`1px solid ${T.border2}` }}>
          <div style={{ textAlign:'center' }}>
            <div style={{ fontSize:28, opacity:0.3 }}>📸</div>
            <div style={{ fontSize:10, color:T.t4, fontFamily:'DM Mono, monospace', marginTop:4 }}>bottle photo</div>
          </div>
        </div>
      )}
      {find.notes && (
        <div style={{ padding:'10px 14px', fontSize:12, color:T.t2, fontStyle:'italic', borderBottom:`1px solid ${T.border2}` }}>
          "{find.notes}"
        </div>
      )}
      <div style={{ padding:'8px 14px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <span style={{ fontSize:11, color:T.t4 }}>{find.user} · {ago}</span>
        {isAdmin && (
          <button style={{ background:'none', border:'none', color:T.t4, cursor:'pointer', fontSize:12, padding:0 }}>✕ Remove</button>
        )}
      </div>
    </Card>
  );
}

function FindsMapSVG({ finds }) {
  // Stylized Chicagoland map — not geographically precise, just illustrative
  const mapFinds = [
    { id:1, cx:320, cy:105, label:"Binny's Wilmette" },
    { id:2, cx:338, cy:165, label:"Binny's Lincoln Park" },
    { id:3, cx:345, cy:310, label:"Friar Tuck Homewood" },
    { id:4, cx:210, cy:290, label:"Binny's Orland Park" },
  ];
  return (
    <div style={{ position:'relative', borderRadius:12, overflow:'hidden', border:`1px solid ${T.border}`, background:'#0d0805' }}>
      <svg viewBox="0 0 460 400" width="100%" style={{ display:'block' }}>
        {/* Grid lines */}
        {[0,1,2,3,4,5].map(i=>(
          <line key={`h${i}`} x1={0} y1={i*80} x2={460} y2={i*80} stroke={T.border} strokeWidth={0.5} opacity={0.4} />
        ))}
        {[0,1,2,3,4,5].map(i=>(
          <line key={`v${i}`} x1={i*92} y1={0} x2={i*92} y2={400} stroke={T.border} strokeWidth={0.5} opacity={0.4} />
        ))}
        {/* Lake Michigan — right edge */}
        <path d="M 380,0 Q 410,100 400,200 Q 390,300 370,400 L 460,400 L 460,0 Z" fill="#0a1520" opacity={0.8} />
        <text x={415} y={50} fill={T.t4} fontSize={10} opacity={0.5} fontFamily="DM Mono, monospace">Lake</text>
        <text x={410} y={62} fill={T.t4} fontSize={10} opacity={0.5} fontFamily="DM Mono, monospace">Michigan</text>
        {/* City outline suggestion */}
        <path d="M 310,100 L 370,90 Q 380,100 378,180 Q 376,240 360,300 L 300,310 L 260,320 L 240,280 L 200,270 L 160,260 L 140,200 L 180,160 L 240,140 Z"
          fill="none" stroke={T.border} strokeWidth={1} opacity={0.4} />
        {/* Markers */}
        {mapFinds.map((f, i) => {
          const find = MOCK_FINDS[i];
          const hoursOld = find ? (Date.now() - find.timestamp) / 3600000 : 0;
          const isFresh = hoursOld < 6;
          const col = isFresh ? '#4ade80' : T.accent;
          return (
            <g key={f.id}>
              <circle cx={f.cx} cy={f.cy} r={14} fill={col} opacity={0.12} />
              <circle cx={f.cx} cy={f.cy} r={7} fill={col} opacity={0.7} />
              <circle cx={f.cx} cy={f.cy} r={3} fill="#fff" />
              {/* Label */}
              <rect x={f.cx+12} y={f.cy-10} width={110} height={16} rx={4} fill="#1a1008" opacity={0.9} />
              <text x={f.cx+17} y={f.cy+2} fill={T.t2} fontSize={9} fontFamily="DM Sans, sans-serif">{f.label}</text>
            </g>
          );
        })}
        {/* Legend */}
        <circle cx={16} cy={382} r={5} fill="#4ade80" opacity={0.7} />
        <text x={26} y={386} fill={T.t3} fontSize={9} fontFamily="DM Sans">Fresh (&lt;6h)</text>
        <circle cx={96} cy={382} r={5} fill={T.accent} opacity={0.7} />
        <text x={106} y={386} fill={T.t3} fontSize={9} fontFamily="DM Sans">Aging</text>
      </svg>
    </div>
  );
}

function FindsScreen() {
  const [view, setView] = useState('list');
  const [bottleName, setBottleName] = useState('');
  const [storeInput, setStoreInput] = useState('');
  const [notes, setNotes] = useState('');
  const [submitted, setSubmitted] = useState(false);

  function handleSubmit(e) {
    e.preventDefault();
    setSubmitted(true);
    setTimeout(() => { setSubmitted(false); setBottleName(''); setStoreInput(''); setNotes(''); }, 2500);
  }

  const inputS = {
    width:'100%', padding:'9px 12px',
    background:T.bg, border:`1px solid ${T.border}`,
    borderRadius:8, color:T.t1, fontSize:14, outline:'none',
    fontFamily:'DM Sans, sans-serif',
  };
  const labelS = { display:'block', fontSize:12, fontWeight:600, color:T.t3, marginBottom:5, marginTop:14, textTransform:'uppercase', letterSpacing:'0.05em' };

  return (
    <div style={{ padding:'16px', maxWidth:700, margin:'0 auto' }}>

      {/* Submit form */}
      <Card style={{ padding:'16px', marginBottom:16 }}>
        <div style={{ fontWeight:800, fontSize:16, color:T.t1, marginBottom:14 }}>📍 Report a Find</div>
        <form onSubmit={handleSubmit}>
          <label style={labelS}>Bottle Name *</label>
          <div style={{ display:'flex', gap:8 }}>
            <input style={{ ...inputS, flex:1 }} placeholder="e.g. Blanton's Original" value={bottleName} onChange={e=>setBottleName(e.target.value)} required />
            <button type="button" title="Scan barcode" style={{ padding:'8px 13px', background:T.card2, border:`1px solid ${T.border}`, borderRadius:8, color:T.accent, cursor:'pointer', fontSize:18, flexShrink:0 }}>📷</button>
          </div>

          <label style={labelS}>Store Location *</label>
          <input style={inputS} placeholder="Search for a store (e.g. Binny's Wilmette…)" value={storeInput} onChange={e=>setStoreInput(e.target.value)} />

          <label style={labelS}>Notes</label>
          <textarea style={{ ...inputS, minHeight:64, resize:'vertical' }} placeholder="How many bottles? Price? Purchase limit?" value={notes} onChange={e=>setNotes(e.target.value)} />

          <label style={labelS}>Photo</label>
          <label style={{ display:'block', background:T.bg, border:`1px dashed ${T.border}`, borderRadius:8, padding:12, cursor:'pointer', textAlign:'center', color:T.t4, fontSize:13 }}>
            📸 Tap to attach a photo
            <input type="file" accept="image/*" style={{ display:'none' }} />
          </label>

          {submitted && <div style={{ fontSize:13, color:T.green, marginTop:10 }}>✓ Find submitted! Thanks for looking out for the club.</div>}

          <button type="submit" style={{ marginTop:14, width:'100%', padding:'11px', background:T.accent, color:'#fff', border:'none', borderRadius:8, cursor:'pointer', fontSize:15, fontWeight:700 }}>
            📍 Submit Find
          </button>
        </form>
      </Card>

      {/* Finds display */}
      <div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
          <div style={{ fontWeight:800, fontSize:16, color:T.t1 }}>Club Finds <span style={{ fontSize:13, color:T.t4, fontWeight:400 }}>({MOCK_FINDS.length})</span></div>
          <div style={{ display:'flex', gap:6 }}>
            {['list','map'].map(v => (
              <button key={v} onClick={()=>setView(v)} style={{ padding:'5px 13px', borderRadius:6, border:'none', cursor:'pointer', background: view===v ? T.accent : T.card2, color: view===v ? '#fff' : T.t3, fontSize:12, fontWeight:600 }}>
                {v==='map' ? '🗺 Map' : '📋 List'}
              </button>
            ))}
          </div>
        </div>

        {view === 'map' && <FindsMapSVG finds={MOCK_FINDS} />}

        {view === 'list' && (
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {MOCK_FINDS.map(f => <FindCard key={f.id} find={f} isAdmin={true} />)}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── ROADMAP SCREEN ───────────────────────────────────────────────────────────
const PRIORITY_META = {
  HIGH:{ label:'High Priority', color:'#f87171', bg:'rgba(248,113,113,0.1)', border:'rgba(248,113,113,0.25)' },
  MED: { label:'Medium',        color:T.amber,   bg:'rgba(251,191,36,0.1)',  border:'rgba(251,191,36,0.25)' },
  LOW: { label:'Nice to have',  color:T.t3,      bg:'transparent',           border:T.border },
};
const EFFORT_META = {
  Low:   { label:'Easy build', color:'#4ade80' },
  Medium:{ label:'Medium lift', color:T.amber },
  High:  { label:'Big build',  color:'#f87171' },
};

function RoadmapCard({ item }) {
  const pri = PRIORITY_META[item.priority];
  const eff = EFFORT_META[item.effort];
  return (
    <Card style={{ padding:16 }}>
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:10, marginBottom:10 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ fontSize:24 }}>{item.icon}</span>
          <div>
            <div style={{ fontWeight:700, fontSize:15, color:T.t1, lineHeight:1.25 }}>{item.title}</div>
            <div style={{ fontSize:11, color:T.t4, marginTop:2 }}>{item.tag}</div>
          </div>
        </div>
        <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:4, flexShrink:0 }}>
          <span style={{ fontSize:10, fontWeight:700, background:pri.bg, color:pri.color, border:`1px solid ${pri.border}`, borderRadius:999, padding:'2px 8px' }}>{pri.label}</span>
          <span style={{ fontSize:10, fontWeight:600, color:eff.color }}>⚡ {eff.label}</span>
        </div>
      </div>
      <div style={{ fontSize:13, color:T.t3, lineHeight:1.65 }}>{item.desc}</div>
    </Card>
  );
}

function RoadmapScreen() {
  const [filter, setFilter] = useState('ALL');
  const items = filter === 'ALL' ? ROADMAP : ROADMAP.filter(r=>r.priority===filter);

  return (
    <div style={{ padding:'16px', maxWidth:800, margin:'0 auto' }}>
      <div style={{ marginBottom:20 }}>
        <div style={{ fontWeight:800, fontSize:22, color:T.t1, letterSpacing:'-0.02em', marginBottom:6 }}>🗺 Roadmap</div>
        <div style={{ fontSize:14, color:T.t3, lineHeight:1.6 }}>
          Features worth building next — sorted by value-to-effort ratio. The goal is making every club member check the app every day.
        </div>
      </div>

      {/* Filters */}
      <div style={{ display:'flex', gap:8, marginBottom:20, flexWrap:'wrap' }}>
        {['ALL','HIGH','MED','LOW'].map(f => {
          const p = PRIORITY_META[f] ?? { label:'All features', color:T.t1, bg:`${T.accent}15`, border:T.accent+'40' };
          const active = filter===f;
          return (
            <button key={f} onClick={()=>setFilter(f)} style={{
              fontSize:13, fontWeight:600, padding:'5px 14px', borderRadius:999, border:'none', cursor:'pointer',
              background: active ? (f==='ALL' ? T.accent : p.bg) : T.card2,
              color: active ? (f==='ALL' ? '#fff' : p.color) : T.t3,
              outline: active && f!=='ALL' ? `1px solid ${p.border}` : 'none',
            }}>
              {f==='ALL' ? 'All' : p.label}
            </button>
          );
        })}
      </div>

      {/* Top picks callout */}
      {filter==='ALL' && (
        <div style={{ background:'rgba(232,148,58,0.07)', border:`1px solid rgba(232,148,58,0.2)`, borderRadius:12, padding:'14px 16px', marginBottom:20 }}>
          <div style={{ fontWeight:700, fontSize:13, color:T.accent, marginBottom:4 }}>💡 Where to start</div>
          <div style={{ fontSize:13, color:T.t3, lineHeight:1.65 }}>
            <strong style={{ color:T.t2 }}>Discord Webhook Alerts</strong> has the highest ROI — it's a low-effort build that instantly makes the tracker 10× more useful without requiring members to open the app. Pair it with <strong style={{ color:T.t2 }}>Auto-Expiring Finds</strong> to keep data quality high, then tackle <strong style={{ color:T.t2 }}>Personal Watchlist</strong> for the engagement loop.
          </div>
        </div>
      )}

      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {items.map(item => <RoadmapCard key={item.id} item={item} />)}
      </div>
    </div>
  );
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
const TABS = [
  { id:'tracker',  label:'Tracker',  icon:'🚛' },
  { id:'auctions', label:'Auctions', icon:'🦄' },
  { id:'finds',    label:'Finds',    icon:'📍' },
  { id:'roadmap',  label:'Roadmap',  icon:'🗺' },
];

function BottomNav({ active, onSelect, counts }) {
  return (
    <nav style={{
      position:'fixed', bottom:0, left:0, right:0, zIndex:100,
      background:'rgba(15,10,5,0.97)', borderTop:`1px solid ${T.border}`,
      display:'flex', backdropFilter:'blur(12px)',
      paddingBottom:'env(safe-area-inset-bottom)',
    }}>
      {TABS.map(t => {
        const isActive = active===t.id;
        return (
          <button key={t.id} onClick={()=>onSelect(t.id)} style={{
            flex:1, background:'none', border:'none', cursor:'pointer',
            padding:'10px 0', display:'flex', flexDirection:'column', alignItems:'center', gap:3,
            transition:'opacity 0.15s',
          }}>
            <span style={{ fontSize:20, position:'relative' }}>
              {t.icon}
              {counts?.[t.id] > 0 && (
                <span style={{ position:'absolute', top:-4, right:-6, background:'#f87171', color:'#fff', fontSize:9, fontWeight:700, borderRadius:999, padding:'1px 4px', lineHeight:1.2 }}>{counts[t.id]}</span>
              )}
            </span>
            <span style={{ fontSize:10, fontWeight: isActive ? 700 : 500, color: isActive ? T.accent : T.t4, letterSpacing:'0.01em' }}>{t.label}</span>
            {isActive && <span style={{ width:18, height:2, background:T.accent, borderRadius:1 }} />}
          </button>
        );
      })}
    </nav>
  );
}

function TopBar({ tab }) {
  const meta = {
    tracker:  { title:'Whiskey Hunter', sub:'Chicagoland Binny\'s · Truck Tracker' },
    auctions: { title:'Whiskey Hunter', sub:'Unicorn Auctions · Live Deals' },
    finds:    { title:'Whiskey Hunter', sub:'Community Finds · Chicagoland' },
    roadmap:  { title:'Whiskey Hunter', sub:'Feature Roadmap · Suggested Builds' },
  };
  const { title, sub } = meta[tab] ?? meta.tracker;
  return (
    <header style={{
      position:'sticky', top:0, zIndex:50,
      background:'rgba(15,10,5,0.95)', borderBottom:`1px solid ${T.border}`,
      backdropFilter:'blur(12px)',
    }}>
      <div style={{ maxWidth:960, margin:'0 auto', padding:'12px 16px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ fontSize:22 }}>🥃</span>
          <div>
            <div style={{ fontWeight:800, fontSize:15, color:T.t1, lineHeight:1.1 }}>{title}</div>
            <div style={{ fontSize:11, color:T.t3 }}>{sub}</div>
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          {tab === 'tracker' && (
            <div style={{ fontSize:11, color:T.t3, textAlign:'right' }}>
              <div>Checked 14m ago</div>
              <div style={{ color:T.t4 }}>6× daily</div>
            </div>
          )}
          <button style={{ background:T.accent, color:'#fff', border:'none', borderRadius:8, padding:'7px 14px', fontSize:12, fontWeight:700, cursor:'pointer' }}>
            {tab === 'tracker' ? 'Refresh' : tab === 'auctions' ? '↺ Refresh' : tab === 'finds' ? '+ Find' : ''}
          </button>
        </div>
      </div>
    </header>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#e8943a",
  "showRoadmap": true,
  "density": "comfortable",
  "showBadges": true
}/*EDITMODE-END*/;

function App() {
  const [tab, setTab] = useState('tracker');
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply accent color override
  useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accentColor);
  }, [tweaks.accentColor]);

  const tabs = tweaks.showRoadmap ? TABS : TABS.filter(t=>t.id!=='roadmap');

  return (
    <div style={{ minHeight:'100vh', background:T.bg }}>
      <TopBar tab={tab} />
      <main style={{ paddingBottom: 80 }}>
        {tab==='tracker'  && <TrackerScreen />}
        {tab==='auctions' && <AuctionsScreen />}
        {tab==='finds'    && <FindsScreen />}
        {tab==='roadmap'  && tweaks.showRoadmap && <RoadmapScreen />}
      </main>
      <BottomNav active={tab} onSelect={setTab} counts={tweaks.showBadges ? { finds:2 } : {}} />

      <TweaksPanel>
        <TweakSection label="Appearance">
          <TweakColor id="accentColor" label="Accent color" value={tweaks.accentColor} onChange={v=>setTweak('accentColor',v)} />
          <TweakRadio id="density" label="Density" value={tweaks.density} options={['compact','comfortable']} onChange={v=>setTweak('density',v)} />
        </TweakSection>
        <TweakSection label="Features">
          <TweakToggle id="showRoadmap" label="Show Roadmap tab" value={tweaks.showRoadmap} onChange={v=>setTweak('showRoadmap',v)} />
          <TweakToggle id="showBadges" label="Show notification badges" value={tweaks.showBadges} onChange={v=>setTweak('showBadges',v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
