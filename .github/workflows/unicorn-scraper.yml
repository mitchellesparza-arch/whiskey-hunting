name: Unicorn Auctions Scraper

on:
  # Triggered by Vercel cron via /api/trigger-unicorn (workflow_dispatch API).
  # Vercel owns the schedule — no GitHub-side crons to avoid throttling.
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape & push to Redis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: unicorn_scraper/requirements.txt

      - name: Install Python dependencies
        working-directory: unicorn_scraper
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('unicorn_scraper/requirements.txt') }}

      - name: Install Playwright browsers
        working-directory: unicorn_scraper
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system deps (cached browser)
        working-directory: unicorn_scraper
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Run scraper
        working-directory: unicorn_scraper
        run: python scraper.py --now

      - name: Confirm Redis push
        run: echo "Scrape complete — deals pushed to Redis key wh:unicorn:deals"
