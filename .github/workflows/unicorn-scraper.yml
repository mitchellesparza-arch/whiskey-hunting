name: Unicorn Auctions Scraper

on:
  schedule:
    # ── Every hour, all day every day ────────────────────────────────────────
    - cron: '0 * * * *'

    # ── Every 30 min, 3 PM – 7 PM Central ───────────────────────────────────
    # CDT (summer, UTC-5): 3:30 PM – 6:30 PM CDT = 20:30–23:30 UTC
    # CST (winter, UTC-6): 2:30 PM – 5:30 PM CST = 20:30–23:30 UTC
    # 7 PM is still covered by the top-of-hour run above
    - cron: '30 20-23 * * *'

  # Also run on-demand from the Actions tab
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape & push to Redis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: unicorn_scraper/requirements.txt

      - name: Install Python dependencies
        working-directory: unicorn_scraper
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('unicorn_scraper/requirements.txt') }}

      - name: Install Playwright browsers
        working-directory: unicorn_scraper
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system deps (cached browser)
        working-directory: unicorn_scraper
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Run scraper
        working-directory: unicorn_scraper
        run: python scraper.py --now

      - name: Confirm Redis push
        run: echo "Scrape complete — deals pushed to Redis key wh:unicorn:deals"
