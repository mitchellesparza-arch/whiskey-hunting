name: Unicorn Auctions Scraper

on:
  schedule:
    # ── Every hour, all day every day ────────────────────────────────────────
    - cron: '0 * * * *'

    # ── Every 30 min starting at 3 PM Central ────────────────────────────────
    # CDT (summer, UTC-5): 3 PM CDT = 20:00 UTC
    # CST (winter, UTC-6): 3 PM CST = 21:00 UTC  (20:30 run fires at 2:30 PM — fine)
    # :30-mark runs from 20:30 UTC → 07:30 UTC covers 3:30 PM – 2:30 AM CDT
    - cron: '30 20-23 * * *'  # 3:30 PM – 6:30 PM CDT
    - cron: '30 0-7   * * *'  # 7:30 PM – 2:30 AM CDT (next UTC day)

  # Also run on-demand from the Actions tab
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape & push to Redis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: unicorn_scraper/requirements.txt

      - name: Install Python dependencies
        working-directory: unicorn_scraper
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        working-directory: unicorn_scraper
        run: playwright install chromium --with-deps

      - name: Run scraper
        working-directory: unicorn_scraper
        run: python scraper.py --now

      - name: Confirm Redis push
        run: echo "Scrape complete — deals pushed to Redis key wh:unicorn:deals"
