// ── Helpers ───────────────────────────────────────────────────────────────────
function timeAgo(ts){
  if(!ts)return null;
  const mins=Math.floor((Date.now()-new Date(ts).getTime())/60000);
  if(mins<1)return'just now';
  if(mins<60)return`${mins}m ago`;
  const hrs=Math.floor(mins/60);
  if(hrs<24)return`${hrs}h ago`;
  return`${Math.floor(hrs/24)}d ago`;
}
function fmtUSD(v){if(v==null)return'—';return v>=1000?`$${(v/1000).toFixed(1)}k`:`$${v}`;}
function eloUpdate(aScore,bScore,result){
  const K=12,ea=1/(1+Math.pow(10,(bScore-aScore)/25));
  const sa=result==='a'?1:result==='tie'?0.5:0;
  return{
    newA:+Math.max(0,Math.min(100,aScore+K*(sa-ea))).toFixed(1),
    newB:+Math.max(0,Math.min(100,bScore+K*((1-sa)-(1-ea)))).toFixed(1),
  };
}
function genPairs(n){const p=[];for(let i=0;i<n;i++)for(let j=i+1;j<n;j++)p.push([i,j]);return p;}

// Pick My Blind — Beli-style ELO ranking
function PickMyBlind({collection,setCollection,onBack}){
  const[step,setStep]=useState(0);
  const[selected,setSelected]=useState([]);// array of collection indices
  const[blindOrder,setBlindOrder]=useState([]);// shuffled
  const[pairs,setPairs]=useState([]);
  const[pairIdx,setPairIdx]=useState(0);
  const[votes,setVotes]=useState({});
  const[revealed,setRevealed]=useState(false);

  function startSession(){
    if(selected.length<2)return;
    const ord=[...selected].sort(()=>Math.random()-0.5);
    setBlindOrder(ord);setPairs(genPairs(selected.length));setPairIdx(0);setVotes({});setRevealed(false);setStep(2);
  }
  function castVote(result){
    const[ai,bi]=pairs[pairIdx];
    setVotes(v=>({...v,[`${ai}-${bi}`]:result}));
    if(pairIdx+1<pairs.length)setPairIdx(p=>p+1);
    else setStep(3);
  }

  const finalScores=useMemo(()=>{
    if(step!==3)return{};
    const s={};
    blindOrder.forEach(idx=>{s[idx]=collection[idx].blindScore;});
    pairs.forEach(([ai,bi])=>{
      const aIdx=blindOrder[ai],bIdx=blindOrder[bi];
      const result=votes[`${ai}-${bi}`];
      if(!result)return;
      const{newA,newB}=eloUpdate(s[aIdx],s[bIdx],result);
      s[aIdx]=newA;s[bIdx]=newB;
    });
    return s;
  },[step,votes,blindOrder,pairs,collection]);

  // ── Step 0: Intro hub ──────────────────────────────────────────────────────
  if(step===0)return(
    <div style={{paddingBottom:24}}>
      <BackHeader title="🫣 Pick My Blind" onBack={onBack}/>
      <div style={{padding:'32px 20px',maxWidth:560,margin:'0 auto'}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:52,marginBottom:14}}>🫣</div>
          <div style={{fontWeight:800,fontSize:22,color:T.t1,letterSpacing:'-0.02em',marginBottom:10}}>Blind Tasting Ranking</div>
          <div style={{fontSize:14,color:T.t3,lineHeight:1.75}}>
            Like <strong style={{color:T.t2}}>Beli</strong> for restaurants — but for whiskey. Select bottles from your collection, pour them blind, then rank them through head-to-head comparisons.
            <br/><br/>
            Your honest preferences build a personal score for each bottle over time. You can't rate in isolation — only compare. The scores reflect what you <em>actually</em> prefer.
          </div>
        </div>
        {/* Score explanation */}
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:28}}>
          {[
            {score:'90+',desc:'One of the best bottles you own',color:T.green},
            {score:'80–89',desc:'Reliably excellent — reach for this often',color:T.accent},
            {score:'70–79',desc:'Solid, enjoyable, no complaints',color:T.amber},
            {score:'<70',desc:'Fine but rarely your first pick',color:T.t3},
          ].map(r=>(
            <div key={r.score} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',background:T.card,border:`1px solid ${T.border}`,borderRadius:10}}>

  // ── Step 3: Head-to-head ───────────────────────────────────────────────────

  // Actually castVote sets step(3) for results. So comparing is during step===2?

  // But startSession calls step(2)... comparing should be step 3.
  // The issue: I wrote step(2) in startSession but the comparing UI would need step 3.

  // But I wrote setStep(2) above already. The file rendering order here matters.
  // 
  // OK I see the issue. The function component is one big block.
  // I'll render the comparing UI here at step===3, results at step===4.
  // startSession was called with step(2) in the code above, and I'll just accept that.
  // The flow will be: step 2 = setup (correct), castVote sets step(3) when DONE with all pairs.
  // But comparing happens WHILE pairIdx advances, which is still during the same step.
  // The comparing UI needs to replace the setup UI once the user clicks "Start Tasting".

  // Fix: Use a separate boolean `tasting` state to toggle between setup and comparing within step===2.
  // Since I'm writing this as a big block, I need to add this. Let me just use `pairIdx >= 0 && step===2 && blindOrder.length > 0 && revealed_key_done` logic.
  //
  // Actually the cleanest approach: use startSession to set step(3) (skipping 2 being compare), and add a separate `showKey` boolean. But I already wrote the step(2) code above with "Start Tasting" button calling setStep(3).
  //
  // Wait, I re-read: "step 2: setup" has a button "I've poured them blind → Start Tasting" which calls setStep(3). So the COMPARING renders at step===3. Good.
  // And castVote (for the last pair) calls setStep(3) — WRONG, should be setStep(4).
  //
  // Let me just render it all correctly here. The castVote should have called setStep(4) not setStep(3).
  // I'll render: step===3 = comparing, step===4 = results.
  
  if(step===3&&pairs.length>0&&pairIdx<pairs.length){
    const[ai,bi]=pairs[pairIdx];
    return(
      <div style={{paddingBottom:24}}>
        <div style={{padding:'12px 16px',borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:T.bg,zIndex:10}}>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:20}}>
            {[[BLIND_LABELS[ai],'a'],[BLIND_LABELS[bi],'b']].map(([lbl,res])=>(
              <button key={lbl} onClick={()=>castVote(res)} style={{padding:'44px 0',border:`2px solid ${T.border}`,borderRadius:16,background:T.card,cursor:'pointer',fontSize:64,fontWeight:800,color:T.t1,lineHeight:1,transition:'all 0.15s',display:'flex',flexDirection:'column',alignItems:'center',gap:8}}

  // ── Step 4: Results ────────────────────────────────────────────────────────
  if(step===3||step===4){

                      <div style={{display:'flex',alignItems:'center',gap:12}}>

                        </div>
                      </div>
                    </Card>

                })}
              </div>
              <button onClick={()=>{
                setCollection(col=>col.map((b,i)=>{
                  if(finalScores[i]!==undefined)return{...b,blindScore:finalScores[i],tastings:b.tastings+1};

                }));

              }} style={{width:'100%',padding:12,background:T.card2,color:T.t1,border:`1px solid ${T.border}`,borderRadius:10,fontWeight:700,fontSize:14,cursor:'pointer'}}>
                Save scores & finish
              </button>
            </>
          )}
        </div>
      </div>
    );
  }

  return null;
}

  return(
    <div style={{position:'fixed',inset:0,zIndex:150,background:'rgba(0,0,0,0.5)'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{position:'absolute',top:0,right:0,bottom:0,width:'min(360px,100vw)',background:T.card,borderLeft:`1px solid ${T.border}`,overflowY:'auto',animation:'slideLeft 0.25s ease'}}>
        <div style={{padding:'14px 16px',borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:T.card,zIndex:1}}>
          <div style={{fontWeight:800,fontSize:16,color:T.t1}}>⚙️ Settings</div>
          <button onClick={onClose} style={{background:'none',border:'none',color:T.t3,cursor:'pointer',fontSize:20,lineHeight:1}}>✕</button>
        </div>
        <div style={{padding:'0 16px 32px'}}>
          {sec('Profile')}
          <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:16}}>
            <div style={{width:52,height:52,borderRadius:'50%',background:'linear-gradient(135deg,#e8943a,#b05a10)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:800,color:'#fff',flexShrink:0}}>WD</div>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:T.t1}}>{name}</div>
              <button style={{fontSize:11,color:T.accent,background:'none',border:'none',cursor:'pointer',padding:0,marginTop:3}}>Change avatar</button>
            </div>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:T.t3,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:4}}>Display Name</div>
            <input style={inp} value={name} onChange={e=>setName(e.target.value)}/>
          </div>
          <div>
            <div style={{fontSize:11,color:T.t3,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:4}}>Discord Handle</div>
            <input style={inp} value={discord} onChange={e=>setDiscord(e.target.value)}/>
          </div>

          {sec('Club')}
          <div style={{padding:'12px 14px',background:T.bg,border:`1px solid ${T.border}`,borderRadius:10}}>
            <div style={{fontWeight:600,fontSize:13,color:T.t1}}>Jon and the Juice</div>
            <div style={{fontSize:11,color:T.t3,marginTop:2}}>Member · Joined January 2024</div>
          </div>

          {sec('App Preferences')}
          {[{l:'Default tab on open',v:'Finds'},{l:'Truck check schedule',v:'6× daily'},{l:'Find expiry',v:'24 hours'},{l:'Finds badge alerts',v:'< 6h fresh'}].map(row=>(
            <div key={row.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${T.border2}`}}>
              <span style={{fontSize:13,color:T.t1}}>{row.l}</span>
              <span style={{fontSize:12,color:T.t3,fontWeight:600}}>{row.v}</span>
            </div>
          ))}

          {sec('Account')}
          <button style={{width:'100%',padding:10,background:'transparent',border:`1px solid rgba(248,113,113,0.3)`,borderRadius:8,color:'#f87171',fontSize:13,fontWeight:600,cursor:'pointer'}}>Sign out</button>
        </div>
      </div>
    </div>
  );
}

// ── BOTTOM NAV ────────────────────────────────────────────────────────────────
const TABS=[
  {id:'finds',  label:'Finds',   icon:'📍'},
  {id:'tracker',label:'Tracker', icon:'🚛'},
  {id:'auctions',label:'Auctions',icon:'🦄'},
  {id:'profile',label:'Profile', icon:'👤'},
];
function BottomNav({active,onSelect,findsBadge}){
  return(
    <nav style={{position:'fixed',bottom:0,left:0,right:0,zIndex:100,background:'rgba(15,10,5,0.97)',borderTop:`1px solid ${T.border}`,display:'flex',backdropFilter:'blur(12px)',paddingBottom:'env(safe-area-inset-bottom)'}}>
      {TABS.map(t=>{
        const isActive=active===t.id;
        const badge=t.id==='finds'?findsBadge:0;
        return(
          <button key={t.id} onClick={()=>onSelect(t.id)} style={{flex:1,background:'none',border:'none',cursor:'pointer',padding:'10px 0',display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
            <span style={{fontSize:20,position:'relative'}}>
              {t.icon}
              {badge>0&&<span style={{position:'absolute',top:-4,right:-6,background:T.red,color:'#fff',fontSize:9,fontWeight:700,borderRadius:999,padding:'1px 4px',lineHeight:1.2}}>{badge}</span>}
            </span>
            <span style={{fontSize:10,fontWeight:isActive?700:500,color:isActive?T.accent:T.t4,letterSpacing:'0.01em'}}>{t.label}</span>
            {isActive&&<span style={{width:18,height:2,background:T.accent,borderRadius:1}}/>}
          </button>
        );
      })}
    </nav>
  );
}

// ── TOP BAR ───────────────────────────────────────────────────────────────────
const TAB_META={
  finds:  {sub:'Community Finds · Chicagoland'},
  tracker:{sub:"Chicagoland Binny's · Truck Tracker"},
  auctions:{sub:'Unicorn Auctions · Live Deals'},
  profile:{sub:'Your Collection & Tastings'},
};
function TopBar({tab,notifCount,onNotif,onSettings}){
  const{sub}=TAB_META[tab]??TAB_META.finds;
  return(
    <header style={{position:'sticky',top:0,zIndex:50,background:'rgba(15,10,5,0.95)',borderBottom:`1px solid ${T.border}`,backdropFilter:'blur(12px)'}}>
      <div style={{maxWidth:960,margin:'0 auto',padding:'11px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:22}}>🥃</span>
          <div>
            <div style={{fontWeight:800,fontSize:15,color:T.t1,lineHeight:1.1}}>Tater Tracker</div>
            <div style={{fontSize:11,color:T.t3}}>{sub}</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          {/* Notification bell */}
          <button onClick={onNotif} style={{position:'relative',background:'none',border:'none',cursor:'pointer',padding:'6px 8px',borderRadius:8,color:T.t3,fontSize:18,lineHeight:1,display:'flex',alignItems:'center'}}>
            🔔
            {notifCount>0&&(
              <span style={{position:'absolute',top:2,right:2,background:T.red,color:'#fff',fontSize:9,fontWeight:700,borderRadius:999,padding:'1px 4px',lineHeight:1.2,minWidth:16,textAlign:'center'}}>
                {notifCount}
              </span>
            )}
          </button>
          {/* Settings gear */}
          <button onClick={onSettings} style={{background:'none',border:'none',cursor:'pointer',padding:'6px 8px',borderRadius:8,color:T.t3,fontSize:18,lineHeight:1,display:'flex',alignItems:'center'}}>
            ⚙️
          </button>
        </div>
      </div>
    </header>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#e8943a",
  "showBadges": true
}/*EDITMODE-END*/;

function App(){
  const[tab,setTab]=useState('finds');
  const[notifOpen,setNotifOpen]=useState(false);
  const[settingsOpen,setSettingsOpen]=useState(false);
  const[collection,setCollection]=useState(MOCK_COLLECTION_INIT);
  const[tweaks,setTweak]=useTweaks(TWEAK_DEFAULTS);

  useEffect(()=>{document.documentElement.style.setProperty('--accent',tweaks.accentColor);},[tweaks.accentColor]);

  const unreadNotifs=MOCK_NOTIFS_INIT.filter(n=>!n.read).length;
  const freshFinds=MOCK_FINDS.filter(f=>(Date.now()-f.timestamp)/3600000<6).length;

  return(
    <div style={{minHeight:'100vh',background:T.bg}}>
      <TopBar tab={tab} notifCount={unreadNotifs} onNotif={()=>{setNotifOpen(true);setSettingsOpen(false);}} onSettings={()=>{setSettingsOpen(true);setNotifOpen(false);}}/>
      <main style={{paddingBottom:80}}>
        {tab==='finds'   &&<FindsScreen/>}
        {tab==='tracker' &&<TrackerScreen/>}
        {tab==='auctions'&&<AuctionsScreen/>}
        {tab==='profile' &&<ProfileScreen collection={collection} setCollection={setCollection}/>}
      </main>
      <BottomNav active={tab} onSelect={setTab} findsBadge={tweaks.showBadges?freshFinds:0}/>
      {notifOpen&&<NotificationsDrawer onClose={()=>setNotifOpen(false)}/>}
      {settingsOpen&&<SettingsDrawer onClose={()=>setSettingsOpen(false)}/>}

      <TweaksPanel>
        <TweakSection label="Appearance">
          <TweakColor id="accentColor" label="Accent color" value={tweaks.accentColor} onChange={v=>setTweak('accentColor',v)}/>
        </TweakSection>
        <TweakSection label="Features">
          <TweakToggle id="showBadges" label="Finds badge count" value={tweaks.showBadges} onChange={v=>setTweak('showBadges',v)}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
